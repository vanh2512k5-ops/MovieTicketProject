version: '3.8'

services:
  # 1. Database Service: SQL Server
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: movie-ticket-db
    user: root
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
    ports:
      - "${MSSQL_PORT}:1433"
    networks:
      - movie-network

  # 2. Object Storage Service: MinIO
  minio:
    image: minio/minio
    container_name: movie-ticket-minio
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"     # API Endpoint
      - "${MINIO_CONSOLE_PORT}:9001" # Web Dashboard
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - movie-network

  # Tự động tạo Bucket khi khởi động (Optional nhưng rất chuyên nghiệp)
  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}); do echo 'Đang chờ MinIO khởi động...'; sleep 1; done;
      /usr/bin/mc mb myminio/${MINIO_BUCKET_NAME};
      /usr/bin/mc anonymous set public myminio/${MINIO_BUCKET_NAME};
      exit 0;
      "
    networks:
      - movie-network

networks:
  movie-network:
    driver: bridge

volumes:
  minio_data: